name: Release Tauri App

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build Windows Tauri App
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri -- build

      - name: Seed portable cache
        run: cargo run --manifest-path src-tauri/Cargo.toml --example seed_response_cache -- .cache/github-markdown --refresh

      - name: Prepare portable package
        run: node scripts/prepare-tauri-portable.cjs

      - name: Compress portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "dist/tauri-portable/*" -DestinationPath "dist/Prompt-Library-Viewer-Tauri-Portable.zip" -Force

      - name: Upload portable package
        uses: actions/upload-artifact@v4
        with:
          name: Prompt-Library-Viewer-Tauri-Portable
          path: dist/Prompt-Library-Viewer-Tauri-Portable.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: Prompt-Library-Viewer-Tauri-Installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Prompt-Library-Viewer-Tauri-Portable.zip
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
